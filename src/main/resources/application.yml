spring:
  application:
    name: interview-flash

  datasource:
    url: jdbc:postgresql://localhost:5432/interview_flash
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    com.flash: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
