spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: interview-flash

  datasource:
    url: jdbc:postgresql://localhost:5432/interview_flash
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      fail-on-empty-beans: false

jwt:
  secret: forest-jwt-secret-key-change-in-production-environment
  expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    com.flash: DEBUG
    org.springframework.security: INFO
