spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: interview-flash

  datasource:
    url: jdbc:postgresql://localhost:5432/interview_flash
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      fail-on-empty-beans: false
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  cache:
    type: caffeine

jwt:
  secret: forest-jwt-secret-key-change-in-production-environment
  expiration-ms: 86400000

server:
  port: 8080

app:
  upload:
    path: ${user.dir}/uploads

logging:
  level:
    com.flash: DEBUG
    org.springframework.security: INFO
