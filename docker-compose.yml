version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: interview-flash-db
    environment:
      POSTGRES_DB: interview_flash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interview-flash-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: interview-flash-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_flash
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interview-flash-network
    restart: unless-stopped

networks:
  interview-flash-network:
    driver: bridge

volumes:
  postgres_data:
